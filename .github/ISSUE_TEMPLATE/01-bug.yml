name: Bug Report
description: Report reproducible behavior that is broken or incorrect.
title: "[Bug]: "
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction steps and environment details help get it fixed faster.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what is broken.
      placeholder: Describe the bug in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: I expected ...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead ...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect usage?
      options:
        - Blocking
        - High
        - Medium
        - Low
      default: 2
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package, application, or commit version where this occurs.
      placeholder: v1.2.3, 1.2.3, or commit SHA

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, runtime, browser, device, container image, or other relevant environment details.
      placeholder: |
        OS:
        Runtime:
        Browser:
        Other:

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Output
      description: Paste relevant logs, stack traces, or screenshots. Logs will be formatted as code.
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add links, screenshots, suspected cause, workarounds, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have included enough information to reproduce the issue.
          required: true
