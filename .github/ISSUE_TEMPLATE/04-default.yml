name: General Issue
description: Open a general issue that does not fit the other templates.
title: "[Issue]: "
labels: ["needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Use this template only when the bug, feature, and task templates do not fit.

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of issue is this?
      options:
        - Question
        - Documentation
        - Configuration
        - Release
        - Other
      default: 4
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
      placeholder: I need help with ...
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include relevant context, examples, links, screenshots, logs, or expected outcomes.
      placeholder: Add details here.
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Links or Issues
      description: Add related issues, pull requests, discussions, documentation, or external references.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have checked whether another issue template would be more appropriate.
          required: true
        - label: I have searched existing issues for duplicates.
          required: true
