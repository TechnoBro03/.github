name: Feature Request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form for new features, behavior changes, and product improvements.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the feature or improvement in a few sentences.
      placeholder: I would like ...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Who benefits from it?
      placeholder: This is useful because ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior, API, UI, workflow, or implementation you want.
      placeholder: The solution could work by ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List alternatives, current workarounds, or reasons existing behavior is not enough.
      placeholder: I considered ...

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this feature to be considered complete?
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: dropdown
    id: breaking-change
    attributes:
      label: Breaking Change
      description: Would this require users to change existing code, configuration, data, or workflows?
      options:
        - 'No'
        - 'Yes'
        - Not sure
      default: 0
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add mockups, links, examples, references, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have searched existing issues for duplicates or similar requests.
          required: true
        - label: I have described the problem and the desired outcome.
          required: true
