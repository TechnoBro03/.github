name: Task
description: Track maintenance, refactoring, documentation, or operational work.
title: "[Task]: "
labels: ["task", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form for work that is not a bug report or feature request.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the work to be done.
      placeholder: Update ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this work needed? Include links, decisions, or background information.
      placeholder: This is needed because ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List the specific work items or boundaries for this task.
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: List anything that should not be handled as part of this task.

  - type: textarea
    id: done-criteria
    attributes:
      label: Definition of Done
      description: What must be true before this task can be closed?
      placeholder: |
        - [ ] Code/docs/config updated
        - [ ] Tests or validation completed
        - [ ] Follow-up work captured

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Urgent
      default: 1

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have included enough context to understand the task.
          required: true
